server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    location = / {
        return 302 /red-tide-risk/;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /red-tide-risk/assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ^~ /red-tide-risk/data/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri =404;
    }

    location ^~ /red-tide-risk/ {
        try_files $uri $uri/ /red-tide-risk/index.html;
    }
}
