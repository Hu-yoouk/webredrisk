services:
  red-tide-risk-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: red-tide-risk-web:latest
    container_name: red-tide-risk-web
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
